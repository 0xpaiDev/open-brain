version: '3.9'

services:
  migrate:
    build: .
    container_name: openbrain-migrate
    environment:
      SQLALCHEMY_URL: ${SQLALCHEMY_URL}
      LOG_LEVEL: info
    command: alembic upgrade head
    networks:
      - openbrain
    profiles:
      - migrate

  api:
    build: .
    container_name: openbrain-api
    environment:
      SQLALCHEMY_URL: ${SQLALCHEMY_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      API_KEY: ${API_KEY:-test-secret-key}
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    networks:
      - openbrain
    profiles:
      - api

  worker:
    build: .
    container_name: openbrain-worker
    environment:
      SQLALCHEMY_URL: ${SQLALCHEMY_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: info
      WORKER_POLL_INTERVAL: "5"
    command: python -m src.pipeline.worker
    networks:
      - openbrain
    profiles:
      - worker

networks:
  openbrain:
    driver: bridge
