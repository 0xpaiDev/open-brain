version: '3.9'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  migrate:
    build: .
    container_name: openbrain-migrate
    env_file: .env
    command: alembic upgrade head
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - migrate
    logging: *default-logging

  api:
    build: .
    container_name: openbrain-api
    env_file: .env
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=172.0.0.0/8"]
    ports:
      - "127.0.0.1:8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  worker:
    build: .
    container_name: openbrain-worker
    env_file: .env
    command: python -m src.pipeline.worker
    environment:
      - OPEN_BRAIN_API_URL=http://api:8000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - worker
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  discord-bot:
    build: .
    container_name: openbrain-discord
    env_file: .env
    command: python -m src.integrations.discord_bot
    environment:
      # Override API URL to use Docker service name instead of localhost
      - OPEN_BRAIN_API_URL=http://api:8000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - discord
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  scheduler:
    build: .
    container_name: openbrain-scheduler
    env_file: .env
    init: true
    command: ["supercronic", "-json", "crontab"]
    environment:
      - OPEN_BRAIN_API_URL=http://api:8000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - scheduler
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  caddy:
    image: caddy:2-alpine
    container_name: openbrain-caddy
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - openbrain
    profiles:
      - caddy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

networks:
  openbrain:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
