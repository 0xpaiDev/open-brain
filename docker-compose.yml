version: '3.9'

services:
  migrate:
    build: .
    container_name: openbrain-migrate
    env_file: .env
    command: alembic upgrade head
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - migrate

  api:
    build: .
    container_name: openbrain-api
    env_file: .env
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - api

  worker:
    build: .
    container_name: openbrain-worker
    env_file: .env
    command: python -m src.pipeline.worker
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - worker

  discord-bot:
    build: .
    container_name: openbrain-discord
    env_file: .env
    command: python -m src.integrations.discord_bot
    environment:
      # Override API URL to use Docker service name instead of localhost
      - OPEN_BRAIN_API_URL=http://api:8000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - openbrain
    profiles:
      - discord
    restart: unless-stopped

networks:
  openbrain:
    driver: bridge
