repos:
  - repo: local
    hooks:
      - id: no-direct-settings-import
        name: Ban direct module-level settings import
        entry: bash -c 'if grep -rn "^from src.core.config import settings" src/ 2>/dev/null; then exit 1; else exit 0; fi'
        language: system
        pass_filenames: false
        stages: [commit]
        description: Prevents importing settings directly at module level. Use get_settings() instead.
